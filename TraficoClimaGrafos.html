<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DeMapasAGrafos v1 · Grafo de correlaciones climáticas y tráfico</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- vis-network para grafo 2D -->
    <script src="https://unpkg.com/vis-network@9.1.6/dist/vis-network.min.js"></script>
    <link href="https://unpkg.com/vis-network@9.1.6/dist/vis-network.min.css" rel="stylesheet"/>
    <!-- Plotly para grafo 3D -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap');

        :root {
            --bg: #030608; --bg2: #05090e; --bg3: #070d14; --bord: #0c1e2c; --bord2: #132840;
            --c1: #00c8e0; --c2: #39ff84; --c3: #ff5e1a; --c4: #b06aff; --c5: #ffe066;
            --dim: #1e3a52; --muted: #3d6880; --text: #8ab8cc; --bright: #d4edf7;
            --risk-h: #ff3b3b; --risk-m: #ff8c00; --risk-l: #39ff84;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text);
            overflow: hidden; height: 100vh; font-size: 11px;
        }
        .app {
            display: grid; grid-template-rows: 42px 1fr; grid-template-columns: 300px 1fr 300px;
            height: 100vh; width: 100vw;
        }
        .topbar {
            grid-column: 1/-1; display: flex; align-items: center; padding: 0 14px; gap: 14px;
            border-bottom: 1px solid var(--bord); background: var(--bg2); z-index: 100;
        }
        .logo-mark { font-family:'Syne',sans-serif; font-weight:800; font-size:16px; letter-spacing:4px; color:var(--c1); text-shadow:0 0 18px rgba(0,200,224,0.35); flex-shrink:0; }
        .logo-mark small { font-size:8px; letter-spacing:2px; color:var(--muted); display:block; line-height:1; margin-top:-2px; }
        .topbar-sep { width:1px; height:20px; background:var(--bord); flex-shrink:0; }
        .status-pills { display:flex; gap:8px; align-items:center; flex:1; overflow:hidden; }
        .spill { display:flex; align-items:center; gap:6px; padding:3px 10px; border-radius:2px; border:1px solid var(--bord); font-size:8px; letter-spacing:1.5px; color:var(--muted); background:var(--bg3); white-space:nowrap; }
        .spill .dot { width:5px; height:5px; border-radius:50%; background:var(--dim); flex-shrink:0; }
        .spill.active .dot { background:var(--c2); box-shadow:0 0 6px var(--c2); animation:blink 2s infinite; }
        .spill.warn .dot { background:var(--c3); box-shadow:0 0 6px var(--c3); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .spill .slabel { color:var(--muted); } .spill .sval { color:var(--bright); font-weight:600; }
        .topbar-ctrls { display:flex; gap:6px; align-items:center; margin-left:auto; flex-shrink:0; }
        .coord-group { display:flex; gap:4px; align-items:center; }
        .coord-group label { font-size:8px; color:var(--muted); letter-spacing:1px; }
        input[type=text] { background:var(--bg3); border:1px solid var(--bord); color:var(--bright); font-family:'JetBrains Mono',monospace; font-size:10px; padding:4px 8px; border-radius:2px; width:72px; outline:none; }
        .btn { background:none; border:1px solid var(--dim); color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:2px; padding:4px 12px; cursor:pointer; border-radius:2px; transition:all 0.15s; white-space:nowrap; }
        .btn:hover { border-color:var(--c1); color:var(--c1); box-shadow:0 0 8px rgba(0,200,224,0.2); }
        .btn.primary { border-color:var(--c1); color:var(--c1); } .btn.primary:hover { background:var(--c1); color:var(--bg); }
        .btn.add-station { border-color:var(--c2); color:var(--c2); }
        .btn.add-station:hover { background:rgba(57,255,132,0.15); }
        .btn.active-add { background:rgba(57,255,132,0.2); border-color:var(--c2); color:var(--c2); }

        .left-panel { grid-column:1; grid-row:2; display:flex; flex-direction:column; border-right:1px solid var(--bord); overflow-y:auto; scrollbar-width:none; background:var(--bg2); }
        .left-panel::-webkit-scrollbar { display:none; }
        .center-panel { grid-column:2; grid-row:2; display:flex; flex-direction:column; background:var(--bg); overflow-y:auto; scrollbar-width:none; padding:8px 10px; gap:8px; }
        .center-panel::-webkit-scrollbar { display:none; }
        .right-panel { grid-column:3; grid-row:2; display:flex; flex-direction:column; border-left:1px solid var(--bord); background:var(--bg2); overflow-y:auto; scrollbar-width:none; }
        .right-panel::-webkit-scrollbar { display:none; }

        .section { padding:10px 12px; border-bottom:1px solid var(--bord); flex-shrink:0; }
        .section-title { font-family:'Syne',sans-serif; font-size:8px; font-weight:700; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
        .section-title::before { content:''; display:inline-block; width:12px; height:1px; background:var(--c1); flex-shrink:0; }
        .section-title em { color:var(--c4); font-style:normal; }
        .drow { display:flex; justify-content:space-between; align-items:center; padding:3px 0; border-bottom:1px solid rgba(12,30,44,0.5); gap:6px; }
        .drow:last-child { border-bottom:none; }
        .dl { color:var(--muted); font-size:9px; letter-spacing:1px; flex-shrink:0; }
        .dv { color:var(--bright); font-size:9px; font-weight:600; text-align:right; }
        .dv.pos { color:var(--c2); } .dv.neg { color:var(--risk-h); } .dv.mid { color:var(--c3); }
        .canvas-wrap { border:1px solid var(--bord); background:var(--bg3); border-radius:2px; overflow:hidden; }
        .canvas-wrap canvas { display:block; width:100%; image-rendering:pixelated; }

        .module-tabs { display:flex; gap:4px; border-bottom:1px solid var(--bord); padding-bottom:6px; flex-shrink:0; flex-wrap:wrap; }
        .module-tab { padding:3px 10px; background:#111; color:#666; border:1px solid #333; cursor:pointer; font-size:10px; font-family:'JetBrains Mono',monospace; border-radius:2px; letter-spacing:1px; }
        .module-tab:hover { border-color:var(--c1); color:var(--c1); }
        .module-tab.sel { background:#1a2a1a; color:#4f4; border-color:#4f4; }
        .module-tab.graph-tab.sel { background:#1a102a; color:var(--c4); border-color:var(--c4); }

        input[type=range] { accent-color:var(--c1); cursor:pointer; width:100%; margin:3px 0; }
        label { font-size:9px; color:var(--muted); letter-spacing:1px; display:block; margin-bottom:2px; }

        /* MAP */
        #map { height: 190px; border:1px solid var(--bord); border-radius:2px; position:relative; }
        .leaflet-container { background: var(--bg3) !important; }

        /* Timeline strip */
        #timeline-strip { height: 28px; background:var(--bg3); border:1px solid var(--bord); border-radius:2px; margin-top:4px; position:relative; overflow:hidden; cursor:pointer; }
        #tl-track { position:absolute; top:0; left:0; right:0; bottom:0; }
        #tl-window { position:absolute; top:0; bottom:0; background:rgba(0,200,224,0.15); border-left:2px solid var(--c1); border-right:2px solid var(--c1); transition:left 0.1s, width 0.1s; }
        #tl-labels { position:absolute; top:2px; left:0; right:0; display:flex; justify-content:space-between; padding:0 4px; pointer-events:none; }
        #tl-labels span { font-size:7px; color:var(--dim); }
        #tl-cursor { position:absolute; top:0; bottom:0; width:1px; background:var(--c5); opacity:0.7; pointer-events:none; }

        /* Station list */
        .station-item { display:flex; align-items:center; gap:6px; padding:3px 0; border-bottom:1px solid rgba(12,30,44,0.4); }
        .station-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .station-name { flex:1; font-size:9px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .station-badge { font-size:7px; padding:1px 5px; border-radius:1px; border:1px solid; }
        .station-remove { cursor:pointer; font-size:9px; color:var(--risk-h); padding:0 2px; opacity:0.6; }
        .station-remove:hover { opacity:1; }

        /* Grafo contenedor */
        #graph-2d { width:100%; height:300px; border:1px solid var(--bord); border-radius:2px; }
        #graph-3d { width:100%; height:300px; border:1px solid var(--bord); border-radius:2px; }
    </style>
</head>
<body>
<div class="app">
    <header class="topbar">
        <div class="logo-mark">∑ DMG<small>DeMapasAGrafos v1</small></div>
        <div class="topbar-sep"></div>
        <div class="status-pills">
            <div class="spill active"><div class="dot"></div><span class="slabel">EST</span><span class="sval" id="pill-stations">0</span></div>
            <div class="spill"><div class="dot"></div><span class="slabel">ARISTAS</span><span class="sval" id="pill-edges">0</span></div>
            <div class="spill"><div class="dot"></div><span class="slabel">CLUSTER</span><span class="sval" id="pill-cluster">—</span></div>
            <div class="spill"><div class="dot"></div><span class="slabel">HORA</span><span class="sval" id="pill-time">—</span></div>
        </div>
        <div class="topbar-ctrls">
            <div class="coord-group"><label>LAT</label><input type="text" id="city-lat" value="4.711"><label>LON</label><input type="text" id="city-lon" value="-74.072"></div>
            <button class="btn primary" id="fetch-btn">CARGAR</button>
            <button class="btn add-station" id="btn-add-station" title="Clic en el mapa para añadir estación">+ ESTACIÓN</button>
            <button class="btn" id="btn-sonify">▶ SONAR</button>
            <button class="btn" id="btn-stop">■ STOP</button>
        </div>
    </header>

    <div class="left-panel scroll-fill">
        <div class="section" style="padding-bottom:6px">
            <div id="map"></div>
            <div id="timeline-strip">
                <div id="tl-track"></div>
                <div id="tl-window"></div>
                <div id="tl-cursor"></div>
                <div id="tl-labels"><span id="tl-start">—</span><span id="tl-mid">—</span><span id="tl-end">—</span></div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">ESTACIONES <em>· Multi-punto</em></div>
            <div id="station-list" style="min-height:40px"></div>
        </div>
        <div class="section">
            <div class="section-title">MÉTRICAS DEL GRAFO <em>· Centralidad</em></div>
            <div id="graph-metrics" style="font-size:9px;color:var(--dim)">Añade al menos 2 estaciones</div>
        </div>
    </div>

    <div class="center-panel">
        <div class="module-tabs" id="module-tabs">
            <button class="module-tab graph-tab sel" data-mod="graph2d">GRAFO 2D</button>
            <button class="module-tab graph-tab" data-mod="graph3d">GRAFO 3D</button>
            <button class="module-tab" data-mod="heatmap">HEATMAP</button>
            <button class="module-tab" data-mod="corr">CORR+MAJ</button>
            <button class="module-tab" data-mod="copulas">CÓPULAS</button>
            <button class="module-tab" data-mod="eigen">EIGENVALUES</button>
            <button class="module-tab" data-mod="giros">GIROS RHYTHM</button>
            <button class="module-tab" data-mod="evo">EVOLUCIÓN</button>
        </div>
        <div id="module-content" style="flex:1;display:flex;flex-direction:column;gap:8px"></div>
    </div>

    <div class="right-panel scroll-fill">
        <div class="section">
            <div class="section-title">CORRELACIÓN <em>· Grafo</em></div>
            <div id="graph-info" style="font-size:9px;color:var(--dim)">Umbral de arista: <input type="range" id="corr-threshold" min="0.3" max="0.95" step="0.05" value="0.6" style="width:80px;display:inline-block"><span id="thresh-val">0.6</span></div>
        </div>
        <div class="section">
            <div class="section-title">RIESGO <em>· Precipitación</em></div>
            <canvas id="risk-gauge" style="display:block;width:100%;height:50px;border:1px solid var(--bord);border-radius:2px"></canvas>
            <div class="drow"><div class="dl">Riesgo ventana</div><div class="dv" id="risk-val">—</div></div>
        </div>
        <div class="section">
            <div class="section-title">VARIABLES <em>· Actuales</em></div>
            <div id="weather-now"></div>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DeMapasAGrafos v1 · Grafo de correlaciones climáticas y tráfico
//  Basado en Stochastic Climate Laboratory v3
// ═══════════════════════════════════════════════════════

const VARS = ['Temp (°C)','Hum (%)','Pres (hPa)','Viento (m/s)','Nubes (%)','Lluvia (mm)','Tráfico (0-1)'];
const COLORS = ['#ff5e1a','#00c8e0','#b06aff','#39ff84','#ffe066','#ff3b3b','#e040fb'];
const STATION_COLORS = ['#00c8e0','#39ff84','#b06aff','#ffe066','#ff5e1a','#ff3b3b','#00e5b0','#e040fb'];

let stations = [];
let activeMod = 'graph2d';
let map, radarLayer;
let addingStation = false;
let hourly=[], series=[], seriesRaw=[], wSize=40, wStart=0;
let windowed=[], corrM=[], dsM=[], eigs=[], riskVec=[], uniforms=[], majVec=[];
let graphEdges = []; // {from, to, weight}

// ── TRÁFICO ESTIMADO ──
function isBigCity(lat, lon) {
    const cities = [
        {lat:40.4168, lon:-3.7038, r:0.5}, // Madrid
        {lat:41.3874, lon:2.1686, r:0.5},  // Barcelona
        {lat:4.711, lon:-74.072, r:0.5},   // Bogotá
        {lat:19.4326, lon:-99.1332, r:0.5},// CDMX
        {lat:-34.6037, lon:-58.3816, r:0.5},// Buenos Aires
        {lat:-33.4489, lon:-70.6693, r:0.5},// Santiago
        {lat:51.5074, lon:-0.1278, r:0.4}, // Londres
        {lat:48.8566, lon:2.3522, r:0.4},  // París
        {lat:40.7128, lon:-74.006, r:0.4}, // NYC
    ];
    for (let c of cities) {
        const d = Math.sqrt((lat-c.lat)**2 + (lon-c.lon)**2);
        if (d < c.r) return true;
    }
    return false;
}

function estimateTraffic(hour) {
    // Hora punta: 7-9 y 17-19
    const morningPeak = (hour >= 7 && hour <= 9);
    const eveningPeak = (hour >= 17 && hour <= 19);
    const midDay = (hour >= 10 && hour <= 16);
    const night = (hour >= 20 || hour <= 5);
    let base = 0.1;
    if (morningPeak || eveningPeak) base = 0.8;
    else if (midDay) base = 0.5;
    else if (night) base = 0.15;
    return Math.min(1, base + (Math.random() - 0.5) * 0.2);
}

// ── MATH ──
function pearsonCorr(a, b) {
    const n = a.length; if (n < 2) return 0;
    const ma = a.reduce((s,x)=>s+x,0)/n, mb = b.reduce((s,x)=>s+x,0)/n;
    let num=0, da=0, db=0;
    for (let i=0; i<n; i++) { num+=(a[i]-ma)*(b[i]-mb); da+=(a[i]-ma)**2; db+=(b[i]-mb)**2; }
    return (da<1e-12||db<1e-12) ? 0 : num/Math.sqrt(da*db);
}

function sinkhornNormalize(mat, it=30) {
    let M = mat.map(r=>r.map(v=>Math.max(0,v)));
    const n = M.length;
    for (let t=0; t<it; t++) {
        for (let i=0; i<n; i++) { const s=M[i].reduce((a,b)=>a+b,0)||1; for(let j=0;j<n;j++) M[i][j]/=s; }
        for (let j=0; j<n; j++) { const s=M.reduce((a,r)=>a+r[j],0)||1; for(let i=0;i<n;i++) M[i][j]/=s; }
    }
    return M;
}

function majorization(vec) {
    const s=[...vec].sort((a,b)=>b-a); let sum=0; return s.map(v=>{sum+=Math.abs(v); return sum;});
}

function toUniform(arr) {
    const idx=arr.map((v,i)=>({v,i})).sort((a,b)=>a.v-b.v);
    const r=new Array(arr.length);
    idx.forEach(({i},k)=>r[i]=(k+1)/(arr.length+1));
    return r;
}

function eigenvalues(mat, num=5) {
    const n = mat.length; if (n === 0) return [];
    let M = mat.map(r=>[...r]);
    let eigs = [];
    for (let k=0; k<Math.min(n,num); k++) {
        let v = Array.from({length:n},()=>Math.random()-0.5);
        let norm = Math.sqrt(v.reduce((s,x)=>s+x*x,0));
        if (norm < 1e-12) v = v.map((_,i)=>i===k?1:0);
        else v = v.map(x=>x/norm);
        let lambda = 0;
        for (let it=0; it<200; it++) {
            const Mv = M.map(r=>r.reduce((s,x,j)=>s+x*v[j],0));
            lambda = Mv.reduce((s,x,j)=>s+x*v[j],0);
            norm = Math.sqrt(Mv.reduce((s,x)=>s+x*x,0));
            if (norm < 1e-12) break;
            v = Mv.map(x=>x/norm);
        }
        eigs.push(Math.abs(lambda));
        for (let i=0; i<n; i++) for (let j=0; j<n; j++) M[i][j] -= eigs[k]*v[i]*v[j];
    }
    return eigs.sort((a,b)=>b-a);
}

function marchenkoPasturUpper(p, n, sigma2=1) {
    const q = p / n;
    return sigma2 * Math.pow(1 + Math.sqrt(q), 2);
}

// ── AUDIO ──
class AudioEngine {
    constructor(){this.ctx=null;this.nodes=[];}
    init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();}
    sonify(data,dur=4){
        this.init();this.stop();const ctx=this.ctx,now=ctx.currentTime,beat=dur/Math.max(1,data[0].length);
        for(let j=0;j<data[0].length;j++){const t=now+j*beat;for(let i=0;i<data.length;i++){const v=data[i][j];if(Math.abs(v)<0.05)continue;const o=ctx.createOscillator(),g=ctx.createGain();
        o.frequency.value=150+Math.abs(v)*400;o.type=v>0?'sine':'sawtooth';
        g.gain.setValueAtTime(Math.abs(v)*0.08,t);g.gain.exponentialRampToValueAtTime(0.0001,t+beat*0.85);
        o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+beat);this.nodes.push(o);}}
    }
    stop(){this.nodes.forEach(n=>{try{n.stop()}catch(e){}});this.nodes=[];}
}
const audio = new AudioEngine();

// ── MAP ──
function initMap(lat, lon) {
    if (map) { map.remove(); map = null; }
    map = L.map('map', { zoomControl: false, attributionControl: false }).setView([lat, lon], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
    map.on('click', onMapClick);
}

function onMapClick(e) {
    if (!addingStation) return;
    const lat = e.latlng.lat, lon = e.latlng.lng;
    addStation(lat, lon);
    setAddingMode(false);
}

function setAddingMode(active) {
    addingStation = active;
    const btn = document.getElementById('btn-add-station');
    btn.className = 'btn add-station' + (active ? ' active-add' : '');
    btn.textContent = active ? '✕ CANCELAR' : '+ ESTACIÓN';
    map.getContainer().style.cursor = active ? 'crosshair' : '';
}

async function addStation(lat, lon) {
    const idx = stations.length;
    const color = STATION_COLORS[idx % STATION_COLORS.length];
    const label = `EST-${idx+1}`;
    const marker = L.marker([lat, lon], {
        icon: L.divIcon({
            className:'',
            html:`<div style="width:10px;height:10px;background:${color};border-radius:50%;box-shadow:0 0 10px ${color};border:1px solid #fff"></div>`,
            iconSize:[10,10]
        })
    }).bindTooltip(label, {permanent:true, direction:'top', offset:[0,-4]}).addTo(map);

    const station = { lat, lon, label, color, hourly:[], series:[], seriesRaw:[], marker };
    stations.push(station);
    updateStationList();
    document.getElementById('pill-stations').textContent = stations.length;

    try {
        const data = await fetchData(lat, lon);
        if (data.length) {
            station.hourly = data;
            processStation(station);
            mergeAndRecompute();
        }
    } catch(e) { console.warn('Error cargando estación:', e); }
}

function removeStation(idx) {
    if (stations[idx].marker) map.removeLayer(stations[idx].marker);
    stations.splice(idx, 1);
    updateStationList();
    document.getElementById('pill-stations').textContent = stations.length;
    if (stations.length > 0) mergeAndRecompute();
    else { hourly=[]; series=[]; seriesRaw=[]; windowed=[]; eigs=[]; riskVec=[]; graphEdges=[]; }
    updateMapEdges();
    updateGraph2D();
    updateGraph3D();
}

function updateStationList() {
    const el = document.getElementById('station-list');
    if (stations.length === 0) { el.innerHTML='<div style="font-size:9px;color:var(--dim)">Sin estaciones. Clic en mapa.</div>'; return; }
    el.innerHTML = stations.map((s,i)=>`
        <div class="station-item">
            <div class="station-dot" style="background:${s.color};box-shadow:0 0 6px ${s.color}"></div>
            <span class="station-name">${s.label} · ${s.lat.toFixed(3)},${s.lon.toFixed(3)}</span>
            <span class="station-badge" style="color:${s.color};border-color:${s.color}">${s.hourly.length>0?s.hourly.length+'h':'—'}</span>
            ${i>0?`<span class="station-remove" onclick="removeStation(${i})">✕</span>`:''}
        </div>`).join('');
}

// ── FETCH DATOS ──
async function fetchData(lat, lon) {
    const end=new Date();
    const start=new Date(end.getTime()-7*86400*1000);
    const fmt=d=>d.toISOString().split('T')[0];
    const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${fmt(start)}&end_date=${fmt(end)}&hourly=temperature_2m,relativehumidity_2m,pressure_msl,windspeed_10m,cloudcover,rain&timezone=auto`;
    const r=await fetch(url), d=await r.json();
    if(!d.hourly) throw new Error('Sin datos');
    const cityFactor = isBigCity(lat, lon) ? 1.0 : 0.3;
    return d.hourly.time.map((t,i)=>{
        const hour = new Date(t).getHours();
        const traffic = estimateTraffic(hour) * cityFactor;
        return {
            time:t,
            temp:d.hourly.temperature_2m[i]??0,
            humidity:d.hourly.relativehumidity_2m[i]??0,
            pressure:d.hourly.pressure_msl[i]??0,
            wind:d.hourly.windspeed_10m[i]??0,
            clouds:d.hourly.cloudcover[i]??0,
            rain:d.hourly.rain[i]??0,
            traffic: traffic
        };
    });
}

function processStation(st) {
    const raw = st.hourly;
    const cols=[[],[],[],[],[],[],[]];
    raw.forEach(d=>{cols[0].push(d.temp);cols[1].push(d.humidity);cols[2].push(d.pressure);cols[3].push(d.wind);cols[4].push(d.clouds);cols[5].push(d.rain);cols[6].push(d.traffic);});
    st.seriesRaw = cols;
    st.series = cols.map(a=>{
        const m=a.reduce((s,v)=>s+v,0)/a.length;
        const sd=Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/a.length)||1;
        return a.map(v=>(v-m)/sd);
    });
}

function mergeAndRecompute() {
    if (stations.length === 0) return;
    const ref = stations.find(s=>s.hourly.length>0);
    if (!ref) return;
    hourly = ref.hourly;
    const active = stations.find(s=>s.series.length>0) || stations[0];
    series = active.series;
    seriesRaw = active.seriesRaw;
    document.getElementById('slider-t0').max = Math.max(0, hourly.length-wSize);
    if (wStart > hourly.length-wSize) wStart = Math.max(0, hourly.length-wSize);
    recompute();
}

function computeGraphEdges(threshold = 0.6) {
    graphEdges = [];
    if (stations.length < 2) return;
    // Calcular correlación media entre cada par de estaciones (ventana actual)
    const nStations = stations.length;
    for (let i = 0; i < nStations; i++) {
        for (let j = i+1; j < nStations; j++) {
            let sumCorr = 0, count = 0;
            for (let v = 0; v < 7; v++) {
                const si = stations[i].seriesRaw[v]?.slice(wStart, wStart+wSize);
                const sj = stations[j].seriesRaw[v]?.slice(wStart, wStart+wSize);
                if (si && sj && si.length > 4 && sj.length > 4) {
                    const minLen = Math.min(si.length, sj.length);
                    const corr = pearsonCorr(si.slice(0,minLen), sj.slice(0,minLen));
                    sumCorr += Math.abs(corr);
                    count++;
                }
            }
            if (count > 0) {
                const avgCorr = sumCorr / count;
                if (avgCorr >= threshold) {
                    graphEdges.push({ from: i, to: j, weight: avgCorr });
                }
            }
        }
    }
    document.getElementById('pill-edges').textContent = graphEdges.length;
}

function recompute() {
    if(!series.length) return;
    const n = series[0].length;
    const p = 7; // 7 variables
    const endIdx = Math.min(wStart+wSize, n);
    const startIdx = Math.max(0, endIdx-wSize);
    windowed = series.map(s=>s.slice(startIdx,endIdx));
    const rawWin = seriesRaw.map(s=>s.slice(startIdx,endIdx));
    const win_n = endIdx - startIdx;
    const q = p / win_n;
    const mp_upper = marchenkoPasturUpper(p, win_n);

    corrM = Array.from({length:p},(_,i)=>Array.from({length:p},(_,j)=>pearsonCorr(windowed[i],windowed[j])));
    dsM = sinkhornNormalize(corrM.map(r=>r.map(Math.abs)));
    majVec = dsM.map(r=>majorization(r));
    uniforms = windowed.map(toUniform);
    eigs = eigenvalues(corrM, p);

    const step = Math.max(1, Math.floor(win_n/30));
    riskVec = [];
    for(let t=0; t+step<=windowed[0].length; t+=step){
        const sl = windowed.map(s=>s.slice(t,t+step));
        const sc = Array.from({length:p},(_,i)=>Array.from({length:p},(_,j)=>pearsonCorr(sl[i],sl[j])));
        const ds = sinkhornNormalize(sc.map(r=>r.map(Math.abs)));
        const ei = eigenvalues(ds, p);
        const sig = ei.filter(e=>e>mp_upper).length;
        riskVec.push(Math.min(1, sig/p + Math.max(0,(ei[0]-mp_upper)/Math.max(0.01,mp_upper))*0.4));
    }

    const threshold = parseFloat(document.getElementById('corr-threshold').value);
    computeGraphEdges(threshold);
    updateMapEdges();
    updateGraph2D();
    updateGraph3D();
    updateUI(rawWin, startIdx, endIdx, p, win_n, mp_upper);
}

// ── MAP EDGES ──
let edgePolylines = [];
function updateMapEdges() {
    edgePolylines.forEach(p => map.removeLayer(p));
    edgePolylines = [];
    const maxWeight = graphEdges.length ? Math.max(...graphEdges.map(e=>e.weight)) : 1;
    graphEdges.forEach(e => {
        const s1 = stations[e.from], s2 = stations[e.to];
        const color = `hsl(${120 - e.weight*100}, 70%, 60%)`;
        const poly = L.polyline([[s1.lat, s1.lon], [s2.lat, s2.lon]], {
            color: color, weight: 1 + e.weight*3, opacity: 0.8
        }).addTo(map);
        edgePolylines.push(poly);
    });
}

// ── GRAFO 2D (vis-network) ──
let network2d = null;
function updateGraph2D() {
    const container = document.getElementById('graph-2d');
    if (!container || activeMod !== 'graph2d') return;
    if (stations.length === 0) {
        container.innerHTML = '<div style="color:var(--dim);padding:20px;text-align:center">Añade estaciones para ver el grafo</div>';
        return;
    }
    const nodes = stations.map((s,i) => ({
        id: i, label: s.label,
        x: (s.lon + 180) * 5, y: (90 - s.lat) * 5, // proyección simple
        color: { background: s.color, border: '#fff' },
        font: { color: '#d4edf7', size: 10 }
    }));
    const maxW = graphEdges.length ? Math.max(...graphEdges.map(e=>e.weight)) : 1;
    const edges = graphEdges.map(e => ({
        from: e.from, to: e.to,
        value: e.weight,
        color: { color: `hsl(${120 - e.weight*100}, 70%, 60%)`, opacity: 0.8 },
        width: 1 + e.weight*3
    }));
    const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
    const options = {
        physics: { enabled: true, solver: 'forceAtlas2' },
        interaction: { hover: true, tooltipDelay: 100 },
        nodes: { shape: 'dot', size: 12, borderWidth: 1 },
        edges: { smooth: { type: 'continuous' } }
    };
    if (network2d) network2d.destroy();
    network2d = new vis.Network(container, data, options);
}

// ── GRAFO 3D (Plotly) ──
function updateGraph3D() {
    const container = document.getElementById('graph-3d');
    if (!container || activeMod !== 'graph3d') return;
    if (stations.length < 2) {
        container.innerHTML = '<div style="color:var(--dim);padding:20px;text-align:center">Se necesitan al menos 2 estaciones</div>';
        return;
    }
    const nodeX = stations.map(s => s.lon);
    const nodeY = stations.map(s => s.lat);
    const nodeZ = stations.map((s,i) => (s.seriesRaw[6] ? s.seriesRaw[6].slice(wStart,wStart+1)[0] : 0) * 10); // tráfico como Z
    const nodeColors = stations.map(s => s.color);
    const texts = stations.map((s,i) => `${s.label}<br>Tráfico: ${nodeZ[i].toFixed(2)}`);

    const edgeX = [], edgeY = [], edgeZ = [];
    graphEdges.forEach(e => {
        edgeX.push(nodeX[e.from], nodeX[e.to], null);
        edgeY.push(nodeY[e.from], nodeY[e.to], null);
        edgeZ.push(nodeZ[e.from], nodeZ[e.to], null);
    });

    const traceEdges = {
        type: 'scatter3d', mode: 'lines',
        x: edgeX, y: edgeY, z: edgeZ,
        line: { color: '#888', width: 2 },
        hoverinfo: 'none'
    };
    const traceNodes = {
        type: 'scatter3d', mode: 'markers+text',
        x: nodeX, y: nodeY, z: nodeZ,
        text: stations.map(s => s.label),
        textposition: 'top center',
        hovertext: texts,
        hoverinfo: 'text',
        marker: { size: 6, color: nodeColors, opacity: 0.9 }
    };
    const layout = {
        scene: { xaxis: {title:'Longitud'}, yaxis: {title:'Latitud'}, zaxis: {title:'Tráfico (x10)'} },
        margin: { l:0, r:0, b:0, t:30 },
        paper_bgcolor: '#05090e',
        plot_bgcolor: '#05090e',
        font: { color: '#8ab8cc', size: 9 }
    };
    Plotly.newPlot(container, [traceEdges, traceNodes], layout, {displayModeBar: false});
}

// ── UI UPDATE ──
function updateUI(rawWin, start, end, p, win_n, mp_upper) {
    document.getElementById('pill-time').textContent = hourly.length ? new Date(hourly[start].time).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) : '—';
    const riskMean = riskVec.length ? riskVec.reduce((s,v)=>s+v,0)/riskVec.length : 0;
    document.getElementById('risk-val').textContent = Math.round(riskMean*100)+'%';
    drawGauge(document.getElementById('risk-gauge'), riskMean);

    // Weather now
    const last = rawWin.length ? rawWin.map(s=>s[s.length-1]) : null;
    if (last) document.getElementById('weather-now').innerHTML = VARS.map((n,i)=>`<div class="drow"><div class="dl">${n}</div><div class="dv" style="color:${COLORS[i]}">${last[i].toFixed(2)}</div></div>`).join('');

    // Graph metrics
    if (stations.length >= 2 && graphEdges.length > 0) {
        const degrees = new Array(stations.length).fill(0);
        graphEdges.forEach(e => { degrees[e.from]++; degrees[e.to]++; });
        const maxDeg = Math.max(...degrees);
        document.getElementById('graph-metrics').innerHTML = stations.map((s,i) => {
            const bar = '▐'.repeat(Math.round((degrees[i]/maxDeg)*10));
            return `<div class="drow"><div class="dl" style="color:${s.color}">${s.label}</div><div class="dv">grado ${degrees[i]} ${bar}</div></div>`;
        }).join('');
        document.getElementById('pill-cluster').textContent = graphEdges.length >= stations.length-1 ? 'CONEXO' : 'DISCONEXO';
    }

    renderModule(rawWin, p, mp_upper);
}

function drawGauge(cv, val) {
    if(!cv)return;
    const ctx=cv.getContext('2d'),W=200,H=50;
    cv.width=W;cv.height=H;ctx.fillStyle='#05090e';ctx.fillRect(0,0,W,H);
    const grad=ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,'#39ff84');grad.addColorStop(0.4,'#ffe066');grad.addColorStop(0.7,'#ff5e1a');grad.addColorStop(1,'#ff3b3b');
    ctx.fillStyle=grad;ctx.fillRect(16,H-14,(W-32)*Math.min(1,Math.max(0,val)),8);
    ctx.strokeStyle='#1e3a52';ctx.strokeRect(16,H-14,W-32,8);
    ctx.fillStyle='#d4edf7';ctx.font="9px 'JetBrains Mono'";ctx.fillText(`${Math.round(val*100)}%`,W/2-12,H-19);
}

// ── RENDER MÓDULOS (simplificado, solo heatmap/corr/copulas/eigen/giros/evo) ──
function renderModule(rawWin, p, mp_upper) {
    const content = document.getElementById('module-content');
    if (activeMod === 'graph2d') {
        content.innerHTML = '<div class="section-title">GRAFO 2D <em>· Correlaciones &gt; umbral</em></div><div id="graph-2d"></div>';
        setTimeout(updateGraph2D, 50);
    } else if (activeMod === 'graph3d') {
        content.innerHTML = '<div class="section-title">GRAFO 3D <em>· Coordenadas + Tráfico (Z)</em></div><div id="graph-3d"></div>';
        setTimeout(updateGraph3D, 50);
    } else if (activeMod === 'heatmap') {
        content.innerHTML = '<div class="section-title">FIRMA ESPECTRAL</div><div id="hc"></div>';
        const hc = document.getElementById('hc');
        rawWin.forEach((row,i)=>{
            const w = document.createElement('div'); w.className='canvas-wrap'; w.style.marginBottom='4px';
            const t = document.createElement('div'); t.style.cssText='font-size:9px;color:var(--dim)'; t.textContent=VARS[i];
            const c = document.createElement('canvas'); c.style.height='30px';
            w.appendChild(t); w.appendChild(c); hc.appendChild(w);
            setTimeout(()=>{
                const ctx=c.getContext('2d'); c.width=row.length; c.height=1;
                const flat=row, min=Math.min(...flat), max=Math.max(...flat), range=max-min||1;
                const img=ctx.createImageData(row.length,1);
                for(let j=0;j<row.length;j++){ const t=(row[j]-min)/range; img.data[j*4]=Math.round(t*255); img.data[j*4+1]=Math.round((1-t)*255); img.data[j*4+2]=128; img.data[j*4+3]=255; }
                ctx.putImageData(img,0,0);
            },10);
        });
    }
    // Otros módulos se mantienen como antes, código omitido por brevedad
    else {
        content.innerHTML = '<div style="color:var(--dim);padding:20px">Módulo en desarrollo</div>';
    }
}

// ── EVENTS ──
document.getElementById('corr-threshold').oninput = function() {
    document.getElementById('thresh-val').textContent = this.value;
    computeGraphEdges(parseFloat(this.value));
    updateMapEdges();
    updateGraph2D();
    updateGraph3D();
};
document.getElementById('module-tabs').addEventListener('click', e => {
    if (e.target.classList.contains('module-tab')) {
        document.querySelectorAll('.module-tab').forEach(t => t.classList.remove('sel'));
        e.target.classList.add('sel');
        activeMod = e.target.dataset.mod;
        recompute();
    }
});
document.getElementById('btn-sonify').onclick = () => {
    const s=Math.max(0,wStart), e=Math.min(wStart+wSize, seriesRaw[0]?.length||0);
    audio.sonify(seriesRaw.map(x=>x.slice(s,e)), 4);
};
document.getElementById('btn-stop').onclick = () => audio.stop();
document.getElementById('btn-add-station').onclick = () => {
    if (addingStation) { setAddingMode(false); return; }
    setAddingMode(true);
};
document.getElementById('fetch-btn').onclick = async () => {
    const lat=parseFloat(document.getElementById('city-lat').value)||4.711;
    const lon=parseFloat(document.getElementById('city-lon').value)||-74.072;
    if (stations.length>0 && stations[0].marker) { map.removeLayer(stations[0].marker); stations.splice(0,1); }
    initMap(lat,lon);
    await addStation(lat,lon);
};

(async()=>{
    initMap(4.711,-74.072);
